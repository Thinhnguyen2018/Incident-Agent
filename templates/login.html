<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập — Incident Notification Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #0a0e14;
  --bg2:       #111720;
  --bg3:       #1a2233;
  --border:    #1e2d42;
  --border2:   #243350;
  --accent:    #00c2ff;
  --green:     #00e5a0;
  --red:       #ff4d6a;
  --text:      #c8d8f0;
  --text2:     #6b8ab0;
  --text3:     #3d5478;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
  );
  pointer-events:none; z-index:1;
}
.card {
  position: relative; z-index: 2;
  width: 100%; max-width: 420px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 40px 32px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
.logo {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
h1 {
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
}
.sub {
  color: var(--text2);
  font-size: 13px;
  margin-bottom: 32px;
}
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px 16px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.btn:hover {
  background: #22304a;
  border-color: var(--accent);
  color: var(--accent);
}
.btn svg { flex-shrink: 0; }
.error {
  background: rgba(255, 77, 106, 0.08);
  border: 1px solid rgba(255, 77, 106, 0.3);
  border-left: 3px solid var(--red);
  color: #ff8fa3;
  padding: 12px 14px;
  border-radius: 4px;
  font-size: 13px;
  margin-bottom: 20px;
  font-family: var(--mono);
  word-break: break-word;
}
.info {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  color: var(--text3);
  font-size: 12px;
  font-family: var(--mono);
  line-height: 1.8;
}
.info b { color: var(--text2); font-weight: 500; }
.domain { color: var(--green); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">VNG Cloud</div>
    <h1>Incident Notification Agent</h1>
    <p class="sub">Đăng nhập bằng tài khoản công ty</p>

    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}

    <a class="btn" href="{{ url_for('start_login') }}">
      <svg width="18" height="18" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
        <rect x="1"  y="1"  width="10" height="10" fill="#F25022"/>
        <rect x="12" y="1"  width="10" height="10" fill="#7FBA00"/>
        <rect x="1"  y="12" width="10" height="10" fill="#00A4EF"/>
        <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
      </svg>
      Đăng nhập với Microsoft 365
    </a>

    <div class="info">
      <b>[ ACCESS POLICY ]</b><br>
      • Chỉ chấp nhận email <span class="domain">@{{ domain }}</span><br>
      • Email phải nằm trong whitelist<br>
      • Liên hệ admin nếu cần cấp quyền
    </div>
  </div>
</body>
</html>
